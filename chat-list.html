<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chat List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>💬 Live Chat</header>

<div class="container">

<div class="card">
<button onclick="loadDonors()">🩸 Donors</button>
<button onclick="loadVolunteers()">👥 Volunteers</button>
</div>

<div id="chatList"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
function openChat(phone){
location.href="chat.html?user="+encodeURIComponent(phone);
}

function loadDonors(){
chatList.innerHTML="";
db.ref("users").once("value").then(s=>{
s.forEach(c=>{
let u=c.val();
chatList.innerHTML+=`
<div class="chat-user" onclick="openChat('${u.phone}')">
<img src="https://i.imgur.com/6VBx3io.png">
<div><h3>${u.name}</h3><p>🩸 ${u.blood}</p></div>
</div>`;
});
});
}

function loadVolunteers(){
chatList.innerHTML="";
db.ref("volunteers").once("value").then(s=>{
s.forEach(c=>{
let u=c.val();
if(u.status==="Approved"){
chatList.innerHTML+=`
<div class="chat-user" onclick="openChat('${u.phone}')">
<img src="https://i.imgur.com/6VBx3io.png">
<div><h3>${u.name}</h3><p>👥 Volunteer</p></div>
</div>`;
}
});
});
}

loadDonors();
</script>

</body>
</html>
