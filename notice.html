<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notice Board</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>
</head>
<body>
<header>📢 Notice Board</header>
<div class="container" id="noticeList"></div>
<script>
db.ref("notice").on("value",function(s){
let html="";
s.forEach(function(c){
let n=c.val();
html+=`<div class="card"><h3>${n.title||"Notice"}</h3><p>${n.message||""}</p></div>`;
});
document.getElementById("noticeList").innerHTML=html||"<div class='card'>No Notice</div>";
});
</script>
</body>
</html>
