name: Build Android APK From Web Code

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create my-app com.ebssherpur.emergencyblood EmergencyBlood
        cd my-app
        cordova platform add android --no-telemetry

    - name: Copy Web Files
      run: |
        rm -rf my-app/www/*
        cp -r * my-app/www/ || true
        rm -rf my-app/www/my-app

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android APK
      run: |
        cd my-app
        cordova build android --verbose

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Emergency-Blood-APK
        path: my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
