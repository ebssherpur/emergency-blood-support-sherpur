<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>👤 Donor Profile</header>

<div class="container">

<div class="card profile">
<img src="https://i.imgur.com/6VBx3io.png">
<h2 id="name"></h2>
</div>

<div class="info"><b>📞 Phone:</b> <span id="phone"></span></div>
<div class="info"><b>🩸 Blood:</b> <span id="blood"></span></div>
<div class="info"><b>📍 District:</b> <span id="district"></span></div>

<button onclick="location.href='search-donor.html'">🔍 Search Donor</button>
<button onclick="location.href='blood-request.html'">🩸 Blood Request</button>
<button onclick="logout()">🚪 Logout</button>

</div>

<script>
document.getElementById("name").innerHTML=localStorage.getItem("name")||"";
document.getElementById("phone").innerHTML=localStorage.getItem("phone")||"";
document.getElementById("blood").innerHTML=localStorage.getItem("blood")||"";
document.getElementById("district").innerHTML=localStorage.getItem("district")||"";

function logout(){
localStorage.clear();
location.href="login.html";
}
</script>

</body>
</html>
