<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Request</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>🩸 Blood Request</header>

<div class="container">
<div class="card">

<input type="text" id="patient" placeholder="Patient Name">

<select id="blood">
<option value="">Blood Group</option>
<option>A+</option><option>A-</option>
<option>B+</option><option>B-</option>
<option>O+</option><option>O-</option>
<option>AB+</option><option>AB-</option>
</select>

<input type="text" id="hospital" placeholder="Hospital">
<input type="text" id="district" placeholder="District">
<input type="text" id="phone" placeholder="Contact Number">

<button onclick="submitRequest()">Submit Request</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>
function submitRequest(){

const id=Date.now();

db.ref("bloodRequests/"+id).set({
patient:patient.value,
blood:blood.value,
hospital:hospital.value,
district:district.value,
phone:phone.value,
time:Date.now(),
status:"Pending"
}).then(()=>{
alert("Blood Request Submitted");
location.href="index.html";
});

}
</script>

</body>
</html>
