<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pending Donors</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>
</head>
<body>
<header>👤 Pending Donors</header>
<div id="list"></div>
<script>
db.ref("users").on("value",function(s){
let h="";
s.forEach(function(c){
let d=c.val();
if(d.status==="Pending"){
h+=`<div class="card">
<h3>${d.name}</h3>
<p>${d.phone}</p>
<p>${d.blood}</p>
<button onclick="approve('${c.key}')">Approve</button>
</div>`;
}
});
list.innerHTML=h||"<div class='card'>No Pending Donors</div>";
});
function approve(id){
db.ref("users/"+id+"/status").set("Approved");
alert("Approved");
}
</script>
</body>
</html>
